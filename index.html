<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/EMECorePage/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Expor EME Company - Launcher de jogos desktop inspirado no Steam" />
    <meta name="theme-color" content="#0a0a12" />
    <title>Expor EME Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
      });
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4795950358148786" crossorigin="anonymous"></script>
    <script src="https://fundingchoicesmessages.google.com/i/pub-4795950358148786" async></script>
    <script>
      function initCMP() {
        if (typeof window.__tcfapi !== 'undefined') {
          window.__tcfapi('addEventListener', 2, function(tcData, success) {
            if (tcData.eventStatus === 'tcloaded' || tcData.eventStatus === 'useractioncomplete') {
              if (tcData.purpose && tcData.purpose.consents && tcData.purpose.consents[1]) {
                gtag('consent', 'update', {
                  'ad_storage': 'granted',
                  'ad_user_data': 'granted',
                  'ad_personalization': 'granted',
                  'analytics_storage': 'granted'
                });
              }
            }
          });
        } else {
          setTimeout(initCMP, 100);
        }
      }
      initCMP();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
